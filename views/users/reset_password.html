{% extends "_layout.html" %}
{% block title %}Reset password · {{ user["username"] }} · TMS{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Reset password</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('users.list_users') }}">Back</a>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="mb-3">
        User: <span class="fw-semibold">{{ user["username"] }}</span>
        <span class="text-muted">({{ user["role"] }})</span>
      </div>

      <form method="post">
        <div class="mb-3">
          <label class="form-label">New password</label>
          <input class="form-control" type="password" name="password" required />
          {% if password_rules %}
            <div class="form-text">{{ password_rules }}</div>
          {% endif %}
        </div>
        <button class="btn btn-primary" type="submit">Reset</button>
      </form>
    </div>
  </div>
{% endblock %}
