{% extends "_layout.html" %}
{% if row and row.get('id') %}
  {% set page_title = "Edit visit" %}
{% else %}
  {% set page_title = "New visit" %}
{% endif %}
{% block title %}{{ page_title }} · TMS{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">{{ page_title }}</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('officer_visits.list_visits') }}">Back</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Visit date</label>
            <input type="date" class="form-control" name="visit_date" required value="{{ row['visit_date'] if row else '' }}" />
          </div>
          <div class="col-md-8">
            <label class="form-label">Field officer</label>
            <select class="form-select" name="field_officer_id" required>
              <option value="" disabled {% if not row or not row['field_officer_id'] %}selected{% endif %}>Select officer…</option>
              {% for o in officers %}
                <option value="{{ o['id'] }}" {% if row and row.get('field_officer_id') == o['id'] %}selected{% endif %}>
                  {{ o['name'] }}{% if o['region'] %} ({{ o['region'] }}){% endif %}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Farmer (optional)</label>
            <select class="form-select" name="farmer_id">
              <option value="" {% if not row or not row['farmer_id'] %}selected{% endif %}>—</option>
              {% for f in farmers %}
                <option value="{{ f['id'] }}" {% if row and row.get('farmer_id') == f['id'] %}selected{% endif %}>
                  {{ f['name'] }}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Contract (optional)</label>
            <select class="form-select" name="contract_id">
              <option value="" {% if not row or not row['contract_id'] %}selected{% endif %}>—</option>
              {% for c in contracts %}
                <option value="{{ c['id'] }}" {% if row and row.get('contract_id') == c['id'] %}selected{% endif %}>
                  #{{ c['id'] }} · {{ c['farmer_name'] or '—' }} · {{ c['officer_name'] or '—' }}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Purpose</label>
            <input class="form-control" name="purpose" value="{{ row['purpose'] if row else '' }}" placeholder="e.g. Field inspection" />
          </div>
          <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea class="form-control" name="notes" rows="4">{{ row['notes'] if row else '' }}</textarea>
          </div>
        </div>

        <div class="mt-3">
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-primary" type="submit">Save</button>
            <button class="btn btn-outline-secondary" type="button" id="saveDraftBtn">Save offline draft</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('offline_drafts.drafts_home') }}">Offline drafts</a>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const KEY = 'tms_offline_drafts_v1';
      const btn = document.getElementById('saveDraftBtn');
      const params = new URLSearchParams(window.location.search);
      const draftId = params.get('draft_id');

      function loadDrafts() {
        try { return JSON.parse(localStorage.getItem(KEY) || '[]') || []; } catch (e) { return []; }
      }
      function saveDrafts(d) {
        localStorage.setItem(KEY, JSON.stringify(d));
      }
      function toObj(form) {
        const fd = new FormData(form);
        const obj = {};
        for (const [k, v] of fd.entries()) obj[k] = v;
        return obj;
      }

      const form = btn.closest('form');
      function uuid() {
        try { return crypto.randomUUID(); } catch (e) { return String(Date.now()) + '-' + Math.random().toString(16).slice(2); }
      }

      function applyDraft(draft) {
        if (!draft || !draft.data) return;
        const data = draft.data;
        Object.keys(data).forEach((k) => {
          const el = form.elements.namedItem(k);
          if (!el) return;
          if (el.type === 'checkbox') {
            el.checked = !!data[k];
          } else {
            el.value = data[k];
          }
        });
        const note = document.createElement('div');
        note.className = 'alert alert-warning';
        note.textContent = 'Offline draft loaded. Review and press Save to submit when online.';
        form.prepend(note);
      }

      // Load draft if requested
      if (draftId) {
        const drafts = loadDrafts();
        const found = drafts.find((d) => d.id === draftId);
        if (found) applyDraft(found);
      }

      if (!btn) return;

      btn.addEventListener('click', () => {
        const data = toObj(form);
        const drafts = loadDrafts();
        const id = uuid();
        drafts.unshift({
          id,
          type: 'visit',
          title: (data.purpose || 'New visit'),
          saved_at: Date.now(),
          open_url: '{{ url_for("officer_visits.create_visit") }}' + '?draft_id=' + encodeURIComponent(id),
          data
        });
        saveDrafts(drafts.slice(0, 50));
        alert('Draft saved on this device.');
      });
    })();
  </script>
{% endblock %}
