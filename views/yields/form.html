{% extends "_layout.html" %}
{% if row and row.get('id') %}
  {% set page_title = "Edit Yield" %}
{% else %}
  {% set page_title = "New Yield" %}
{% endif %}
{% block title %}{{ page_title }} · TMS{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">{{ page_title }}</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('yields.list_yields') }}">Back</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {% if return_to %}
          <input type="hidden" name="return_to" value="{{ return_to }}" />
        {% endif %}

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Contract</label>
            <select class="form-select" name="contract_id" required>
              <option value="" disabled {% if not row or not row['contract_id'] %}selected{% endif %}>
                Select contract…
              </option>
              {% for c in contracts %}
                <option value="{{ c['id'] }}" {% if row and row.get('contract_id') == c['id'] %}selected{% endif %}>
                  #{{ c['id'] }} · {{ c['farmer_name'] or '—' }} · {{ c['field_officer_name'] or '—' }}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Delivery date</label>
            <input
              type="date"
              class="form-control"
              name="delivery_date"
              required
              value="{{ row['delivery_date'] if row and row.get('delivery_date') else '' }}"
            />
          </div>

          <div class="col-md-3">
            <label class="form-label">Season</label>
            <input class="form-control" name="season" required value="{{ row['season'] if row and row.get('season') else '' }}" placeholder="e.g. 2025/2026" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Grade</label>
            <input class="form-control" name="grade" value="{{ row['grade'] if row and row.get('grade') else '' }}" placeholder="e.g. A, B1" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Weight (kg)</label>
            <input
              class="form-control"
              name="weight_kg"
              inputmode="decimal"
              required
              value="{{ row['weight_kg'] if row and row.get('weight_kg') is not none else '' }}"
              placeholder="e.g. 125.5"
            />
          </div>

          <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea class="form-control" name="notes" rows="4">{{ row['notes'] if row and row.get('notes') else '' }}</textarea>
          </div>
        </div>

        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
