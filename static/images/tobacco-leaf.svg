    <!-- Leaf veins -->
    <path stroke="#14532d" stroke-width="3" stroke-linecap="round" fill="none" d="M100 190 L100 35 M100 170 Q80 150 55 140 M100 145 Q80 120 60 110 M100 120 Q80 95 65 85 M100 95 Q85 75 75 60 M100 170 Q120 150 145 140 M100 145 Q120 120 140 110 M100 120 Q120 95 135 85 M100 95 Q115 75 125 60" opacity="0.6" />
  </g>
</svg>
