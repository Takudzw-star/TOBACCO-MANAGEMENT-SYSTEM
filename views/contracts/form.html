{% extends "_layout.html" %}
{% if contract and contract.get('id') %}
  {% set page_title = "Edit Contract" %}
{% else %}
  {% set page_title = "New Contract" %}
{% endif %}
{% block title %}{{ page_title }} · TMS{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">{{ page_title }}</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('contracts.list_contracts') }}">Back</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Farmer</label>
            <select class="form-select" name="farmer_id" required>
              <option value="" disabled {% if not contract or not contract['farmer_id'] %}selected{% endif %}>
                Select farmer…
              </option>
              {% for f in farmers %}
                <option value="{{ f['id'] }}" {% if contract and contract.get('farmer_id') == f['id'] %}selected{% endif %}>
                  {{ f['name'] }}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Field Officer</label>
            <select class="form-select" name="field_officer_id" required>
              <option
                value=""
                disabled
                {% if not contract or not contract['field_officer_id'] %}selected{% endif %}
              >
                Select field officer…
              </option>
              {% for o in officers %}
                <option
                  value="{{ o['id'] }}"
                  {% if contract and contract.get('field_officer_id') == o['id'] %}selected{% endif %}
                >
                  {{ o['name'] }}{% if o['region'] %} ({{ o['region'] }}){% endif %}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Contract date</label>
            <input
              type="date"
              class="form-control"
              name="contract_date"
              value="{{ contract['contract_date'] if contract and contract.get('contract_date') else '' }}"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">End date</label>
            <input
              type="date"
              class="form-control"
              name="end_date"
              value="{{ contract['end_date'] if contract and contract.get('end_date') else '' }}"
            />
          </div>

          <div class="col-12">
            <label class="form-label">Details</label>
            <textarea class="form-control" name="details" rows="4">{{ contract['details'] if contract and contract.get('details') else '' }}</textarea>
          </div>
        </div>

        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
